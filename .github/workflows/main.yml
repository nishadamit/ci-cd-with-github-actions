name: Build and Deploy
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - feature

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Maven Build
        run: mvn install

      # - name: Upload Build Artifacts (WAR)
      #   uses: astertom/nexus-upload-artifact@v1
      #   with:
      #     name: vprofile-app  
      #     path: target/*.war

      - name: Notify if Build Fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."
  
  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run Test on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping integration tests on other branches"

  Security-Scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vulnerability-type: os,library
          output: trivy-report.json