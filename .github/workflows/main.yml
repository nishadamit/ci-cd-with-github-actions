name: Build and Deploy
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - feature

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Maven Build
        run: mvn install

      # - name: Upload Build Artifacts (WAR)
      #   uses: astertom/nexus-upload-artifact@v1
      #   with:
      #     name: vprofile-app  
      #     path: target/*.war

      - name: Notify if Build Fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."
  
  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Tests on main branch
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle