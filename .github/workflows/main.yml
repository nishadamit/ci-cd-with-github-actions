name: Build and Deploy
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - feature
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Maven Build
        run: mvn install
  
  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Tests on main branch
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle